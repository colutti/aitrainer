services:
  backend:
    build:
      context: ../backend
    working_dir: /workspace/backend
    volumes:
      - ../:/workspace
    env_file:
      - ../backend/.env.test
    environment:
      PYTHONPATH: /workspace/backend
      MONGO_URI: mongodb://aitrainer:aitrainerpass@mongo:27017/aitrainer_test?authSource=admin
      DB_NAME: aitrainer_test
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION_NAME: aitrainer_test
      RUNNING_IN_CONTAINER: "true"
      STRIPE_API_BASE: http://stripe-mock:12111
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      stripe-mock:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "/workspace/scripts/test/backend_healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  frontend:
    image: docker.io/library/node:22-slim
    working_dir: /workspace/frontend
    volumes:
      - ../:/workspace
      - frontend_e2e_node_modules:/workspace/frontend/node_modules
      - frontend_e2e_npm_cache:/root/.npm
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: >
      sh -lc "/workspace/scripts/verify/npm-install-if-needed.sh /workspace/frontend &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/workspace/scripts/test/frontend_healthcheck.cjs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.1-jammy
    working_dir: /workspace/frontend
    shm_size: 1gb
    volumes:
      - ../:/workspace
      - frontend_playwright_node_modules:/workspace/frontend/node_modules
      - frontend_playwright_npm_cache:/root/.npm
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      E2E_API_BASE_URL: http://backend:8000
      PLAYWRIGHT_SKIP_WEB_SERVER: "1"
      VITE_E2E_USER_EMAIL: bot-real@fityq.it
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command: >
      sh -lc "/workspace/scripts/verify/npm-install-if-needed.sh /workspace/frontend &&
      npx playwright test --project=chromium --reporter=list"
    networks:
      - app-network

volumes:
  frontend_e2e_node_modules:
  frontend_e2e_npm_cache:
  frontend_playwright_node_modules:
  frontend_playwright_npm_cache:
