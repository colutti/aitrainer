services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - /app/.venv
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://aitrainer:aitrainerpass@mongo:27017/aitrainerdb?authSource=admin}
      - DB_NAME=aitrainerdb
      - QDRANT_HOST=qdrant
      - RUNNING_IN_CONTAINER=true
      - RATE_LIMIT_LOGIN=100/minute

    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo
      - qdrant
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aitrainer-network

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_MODE: ${BUILD_MODE:-development}
      target: build
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-AIzaSyCZv-226HzCoHkQ1y32NdU3xfvQIkWozWU}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-fityq-dev-colutti.firebaseapp.com}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-fityq-dev-colutti}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-fityq-dev-colutti.firebasestorage.app}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-845388270789}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-1:845388270789:web:313d10dbfb2c359a56f4ac}
    command: npm run dev -- --host
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aitrainer-network

  # ADMIN SERVICES REMOVED FROM DOCKER-COMPOSE FOR LOCAL DEVELOPMENT
  # Use instead:
  #   make front-admin    # Run frontend/admin with npm dev
  #   make api-admin      # Run backend-admin with python
  # See ADMIN_DEPLOYMENT.md for deployment instructions

  mongo:
    image: docker.io/library/mongo:latest
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-aitrainer}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-aitrainerpass}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-aitrainerdb}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.runCommand('ping').ok\" -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - aitrainer-network

  mongo-express:
    image: docker.io/library/mongo-express:latest
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-aitrainer}:${MONGO_INITDB_ROOT_PASSWORD:-aitrainerpass}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-mongoexpressuser}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-mongoexpresspass}
    depends_on:
      - mongo
    networks:
      - aitrainer-network

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && exec 3<&-"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - aitrainer-network

volumes:
  mongodata:
  qdrant_data:

networks:
  aitrainer-network:
    driver: bridge
